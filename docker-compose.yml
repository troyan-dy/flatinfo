services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Внутри сети compose фронт ходит на бэкенд по имени сервиса.
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped
