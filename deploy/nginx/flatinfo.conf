# Reverse-proxy для flatinfo.
#
# Один общий nginx на хосте владеет портами 80/443 и разруливает запросы по
# доменному имени (server_name) на нужное приложение. Каждое приложение слушает
# свой внутренний порт только на loopback (тут — 127.0.0.1:3000), наружу закрыто.
# Добавление ещё одного сайта = ещё один такой файл с другим server_name и портом.
#
# Сейчас домена нет → это default_server: ловит запросы по IP (http://89.124.117.67)
# и всё, что не сматчилось другим server_name. Когда появится домен:
#   1) заменить `server_name _;` на `server_name flatinfo.example.com;`
#   2) убрать `default_server` (или оставить на одном из сайтов как заглушку)
#   3) выпустить сертификат: `certbot --nginx -d flatinfo.example.com`

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Прокси на SSR-фронтенд Next.js (контейнер frontend, порт проброшен на loopback).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Поддержка upgrade (HMR в dev не нужен в prod, но не мешает).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
