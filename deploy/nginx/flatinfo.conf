# Reverse-proxy для flatinfo с HTTPS (Let's Encrypt).
#
# Один общий nginx на хосте владеет портами 80/443 и разруливает запросы по
# доменному имени (server_name) на нужное приложение. Приложение слушает свой
# внутренний порт только на loopback (тут — 127.0.0.1:3000), наружу закрыто.
# Добавление ещё одного сайта = ещё один такой файл с другим server_name/портом.
#
# Сертификат выпускается и продлевается через webroot (/var/www/certbot) — этот
# конфиг сертботом НЕ редактируется и остаётся источником правды в git.
# Первый выпуск и продление см. в README, раздел «HTTPS».

# HTTP: отдаём ACME-челлендж (для выпуска/продления) и редиректим всё на HTTPS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name flatinfo.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: TLS + проксирование на SSR-фронтенд Next.js.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name flatinfo.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/flatinfo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flatinfo.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Безопасность: HSTS форсит HTTPS в браузере; остальное — против сниффинга
    # типов, кликджекинга и утечки реферера на сторонние сайты.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
